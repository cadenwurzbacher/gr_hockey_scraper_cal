name: Scrape Hockey Calendars

on:
  schedule:
    # 6 AM Eastern daily (UTC-5 or UTC-4)
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Format email body
        run: python scripts/format_email.py > email_body.txt

      - name: Send email report
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ${{ secrets.SMTP_USER }}
          to: caden@cadenwurzbacher.com
          subject: "GR Hockey Calendar – Daily Report"
          body: file://email_body.txt

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/gr-hockey.ics output/events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update hockey calendar [skip ci]"
            git push
          fi
